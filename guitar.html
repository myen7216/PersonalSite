<body data-page="guitar">

        </article>
        <article class="guitar-slide" data-title="Acoustic Mood Piece">

      <div id="guitar-label" class="guitar-label">Neon Night Jam</div>
      <div id="guitar-audio-status" class="guitar-audio-status" aria-live="polite">🔇 muted</div>

  </main>

  <nav class="site-dock" aria-label="Site Navigation">
